# music-api joins the existing cloudflared tunnel network (from the leptos
# compose) so the tunnel can route musicapi.yudhyapw.com -> music-api:8080.
# The tunnel must already be up (its network must exist).
services:
  music-api:
    build: .
    image: music-api:latest
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      # Fixed container paths — override whatever .env has for local dev.
      - DATABASE_URL=sqlite:///var/lib/music-api/music.db
      - BIND_ADDR=0.0.0.0:8080
    volumes:
      - music-api-data:/var/lib/music-api
    networks:
      - tunnel

volumes:
  music-api-data:

networks:
  tunnel:
    # The leptos/cloudflared compose network. Override TUNNEL_NETWORK if
    # `docker network ls` shows a different name.
    name: ${TUNNEL_NETWORK:-portofolio-yudhya-leptos_default}
    external: true
